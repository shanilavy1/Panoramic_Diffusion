# ============================================================
# CT-to-Panoramic-Xray Diffusion Model Configuration
# ============================================================
# Dataset: ~40 CT-Xray pairs (small dataset)
# Diffusion: 2D X-ray generation conditioned on VAE-encoded 3D CT
# CT VAE-encoded shape: (4, 128, 56, 56)
# X-ray shape: (1, 224, 224)
# ============================================================

# --- Image dimensions ---
diffusion_img_size: 224          # X-ray spatial size (H=W=224)
diffusion_depth_size: 128        # CT depth (kept for compatibility)
diffusion_num_channels: 1        # Grayscale X-ray

# --- UNet architecture ---
unet_type: v2                    # v2 = ResNet blocks + spatial attention + FiLM CT conditioning

# --- Diffusion schedule ---
timesteps: 1000                  # Total diffusion timesteps
sampling_timesteps: 250          # DDIM sampling steps (fewer for faster inference)

# --- Loss configuration ---
loss_type: l1_lpips              # L1 + perceptual loss
l1_weight: 1.0
perceptual_weight: 0.01
discriminator_weight: 0.0        # Discriminator disabled (set > 0 to enable)

# --- Training hyperparameters (tuned for ~40 pairs) ---
batch_size: 4                    # Small batch for small dataset
train_lr: 5e-5                   # Lower LR to reduce overfitting (was 1e-4)
train_num_steps: 100000           # Total training steps
gradient_accumulate_every: 2     # Effective batch = 4 * 2 = 8
ema_decay: 0.999                 # Higher EMA for small dataset (smoother averaging)
amp: False                       # Mixed precision off
max_grad_norm: 1.0               # Gradient clipping
num_workers: 4                   # DataLoader workers

# --- Regularization ---
weight_decay: 1e-4               # L2 regularization via AdamW
use_cosine_lr: True              # Cosine annealing LR schedule (decays to 1e-6)

# --- EMA settings ---
step_start_ema: 100              # Start EMA early (small dataset converges faster)
update_ema_every: 10             # EMA update frequency

# --- Logging & checkpointing ---
validate_every_n_epochs: 5      # Run full validation (metrics + samples + val loss) every N epochs
num_sample_rows: 1               # Number of sample rows for visualization

# --- LoRA fine-tuning ---
lora: False                      # LoRA disabled by default (enable for fine-tuning)
lora_first: False

# --- Checkpoint ---
results_folder: "./results/ddpm/"
load_milestone: False

# --- Reproducibility ---
seed: 42                         # Global random seed for reproducibility

# --- GPU ---
gpus: 0

# --- Dataset ---
name_dataset: XRAY_CTPA      # Dataset identifier
use_augmented_data: True      # Use augmented dataset (CT_preprocessed_aug / PX_preprocessed_aug)
train_ratio: 0.80
val_ratio: 0.10
test_ratio: 0.10

# --- Wandb configuration ---
use_wandb: True
wandb_project: Panoramic_Diffusion
wandb_run_name: experiment_4
